ldp:
  syncWave: wave-4

authelia:
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      cert-manager.io/cluster-issuer: ca-issuer
    tls:
      enabled: true
      secret: authelia-tls

  configMap:
    theme: dark
    log:
      level: info

    ntp:
      disable_startup_check: true
      disable_failure: true

    authentication_backend:
      refresh_interval: 1h
      ldap:
        enabled: true
        implementation: lldap
        address: ldap://lldap-chart-service:3890
        base_dn: DC=ldp,DC=com
        additional_users_dn: OU=people
        additional_groups_dn: OU=groups
        groups_filter: (member={dn})
        user: UID=svc_authelia,OU=people,DC=ldp,DC=com
        password:
          secret_name: lldap-authelia-credentials
          path: password

    access_control:
      default_policy: deny
      rules:
        - domain: "*"
          policy: one_factor

    storage:
      local:
        enabled: true
        path: /config/db.sqlite3

    notifier:
      filesystem:
        enabled: true

    session:
      cookies:
        - name: authelia_session
          domain: auth-127-0-0-1.nip.io
          authelia_url: https://auth-127-0-0-1.nip.io
          same_site: lax
          secure: true
          expiration: 1h
          inactivity: 5m
          remember_me: 1M

    identity_providers:
      oidc:
        enabled: true

        jwks:
          - key_id: default
            algorithm: RS256
            use: sig
            key:
              path: /secrets/jwk-rsa/tls.key
            certificate_chain:
              path: /secrets/jwk-rsa/tls.crt

        lifespans:
          access_token: 1h
          authorize_code: 1m
          id_token: 1h
          refresh_token: 90m

        cors:
          endpoints: [authorization, token, revocation, introspection]
          allowed_origins:
            - https://cd-127-0-0-1.nip.io
            - https://portal-127-0-0-1.nip.io
            - https://kargo-127-0-0-1.nip.io
            - https://vcs-127-0-0-1.nip.io

        claims_policies:
          default:
            id_token: [groups, email, preferred_username, name]

        enable_client_debug_messages: false

        clients:
          - client_id: argocd
            client_name: Argo CD
            public: false
            authorization_policy: one_factor
            consent_mode: implicit
            redirect_uris:
              - https://cd-127-0-0-1.nip.io/auth/callback
            scopes: [openid, groups, email]
            grant_types: [authorization_code]
            response_types: [code]
            token_endpoint_auth_method: client_secret_basic
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none
            client_secret:
              path: /hashed-secrets/argocd-password

          - client_id: argocd-cli
            client_name: Argo CD (CLI)
            public: true
            authorization_policy: one_factor
            require_pkce: true
            pkce_challenge_method: S256
            consent_mode: implicit
            redirect_uris:
              - https://cd-127-0-0-1.nip.io/auth/callback
            scopes: [openid, offline_access, groups, email]
            grant_types: [authorization_code, refresh_token]
            response_types: [code]
            token_endpoint_auth_method: none
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none

          - client_id: backstage
            client_name: Backstage Portal
            public: false
            authorization_policy: one_factor
            require_pkce: true
            pkce_challenge_method: S256
            consent_mode: implicit
            redirect_uris:
              - https://portal-127-0-0-1.nip.io/api/auth/oidc/handler/frame
              - https://portal-127-0-0-1.nip.io/api/auth/oidc/handler
            scopes: [openid, profile, email, offline_access]
            grant_types: [authorization_code, refresh_token]
            response_types: [code]
            token_endpoint_auth_method: client_secret_post
            client_secret:
              path: /hashed-secrets/backstage-password

          - client_id: kargo
            client_name: Kargo
            public: true
            authorization_policy: one_factor
            consent_mode: implicit
            redirect_uris:
              - https://kargo-127-0-0-1.nip.io/login
            scopes: [openid, profile, offline_access, groups, email]
            grant_types: [authorization_code]
            response_types: [code]
            token_endpoint_auth_method: none
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none

          - client_id: gitea
            client_name: Gitea
            public: false
            authorization_policy: one_factor
            consent_mode: implicit
            redirect_uris:
              - https://vcs-127-0-0-1.nip.io/user/oauth2/Authelia/callback
            scopes: [openid, profile, email, groups]
            grant_types: [authorization_code]
            response_types: [code]
            token_endpoint_auth_method: client_secret_basic
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none
            client_secret:
              path: /hashed-secrets/gitea-password

  pod:
    kind: Deployment
    annotations:
      secret.reloader.stakater.com/reload: "argocd-oidc-client-secret,backstage-oidc-client-secret,gitea-oidc-client-secret"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    extraVolumes:
      - name: hashed-secrets
        emptyDir: {}
      - name: authelia
        emptyDir:
          sizeLimit: 100Mi
      - name: secret-backstage-oidc-client-secret
        secret:
          secretName: backstage-oidc-client-secret
          optional: true
          items:
            - key: password
              path: password
      - name: secret-gitea-oidc-client-secret
        secret:
          secretName: gitea-oidc-client-secret
          optional: true
          items:
            - key: password
              path: password

    extraVolumeMounts:
      - name: hashed-secrets
        mountPath: /hashed-secrets
      - name: authelia
        mountPath: /config
        readOnly: false

    initContainers:
      - name: hash-oidc-secrets
        image: authelia/authelia:latest
        env:
          - name: X_AUTHELIA_CONFIG
            value: /configuration.yaml
        command:
          - sh
          - -c
          - |
            set -eu

            # Placeholder hash that won't match any real secret.
            # Used for clients whose secrets haven't been created yet.
            PLACEHOLDER='$pbkdf2-sha512$310000$placeholder$placeholder'

            hash_secret() {
              name="$1"
              path="/secrets/${name}-oidc-client-secret/password"
              if [ -f "$path" ]; then
                echo "Hashing ${name} client secret..."
                authelia crypto hash generate pbkdf2 \
                  --variant sha512 \
                  --password "$(cat "$path")" \
                  | sed 's/^Digest: //' \
                  > "/hashed-secrets/${name}-password"
              else
                echo "Skipping ${name} (secret not yet available, using placeholder)"
                echo "$PLACEHOLDER" > "/hashed-secrets/${name}-password"
              fi
            }

            hash_secret argocd
            hash_secret backstage
            hash_secret gitea

            echo "Done"
        volumeMounts:
          - name: secret-argocd-oidc-client-secret
            mountPath: /secrets/argocd-oidc-client-secret
            readOnly: true
          - name: secret-backstage-oidc-client-secret
            mountPath: /secrets/backstage-oidc-client-secret
            readOnly: true
          - name: secret-gitea-oidc-client-secret
            mountPath: /secrets/gitea-oidc-client-secret
            readOnly: true
          - name: secret-jwk-rsa
            mountPath: /secrets/jwk-rsa
            readOnly: true
          - name: config
            mountPath: /configuration.yaml
            subPath: configuration.yaml
            readOnly: true
          - name: hashed-secrets
            mountPath: /hashed-secrets

  secret:
    additionalSecrets:
      lldap-authelia-credentials: {}
      jwk-rsa:
        items:
          - key: tls.key
            path: tls.key
          - key: tls.crt
            path: tls.crt
      argocd-oidc-client-secret:
        items:
          - key: password
            path: password
