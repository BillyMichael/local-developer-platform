ldp:
  syncWave: wave-3

platform:
  repoURL: https://github.com/BillyMichael/LDP.git
  targetRevision: main
  applicationSets:
    enabled: true
  claims:
    enabled: true

argo-cd:
  server:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    insecure: true
    podAnnotations:
      secret.reloader.stakater.com/reload: "argocd-oidc-client-secret"
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        cert-manager.io/cluster-issuer: ca-issuer
      hostname: cd-127-0-0-1.nip.io
      tls: true

  global:
    domain: cd-127-0-0-1.nip.io

  controller:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    metrics:
      enabled: true
  serverMetrics:
    enabled: true
  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    metrics:
      enabled: true
  applicationSet:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    metrics:
      enabled: true

  dex:
    enabled: false
  configs:
    params:
      server.insecure: 'true'
      applicationsetcontroller.enable.progressive.syncs: 'true'
    cm:
      url: https://cd-127-0-0-1.nip.io
      create: true
      oidc.tls.insecure.skip.verify: 'true'
      application.resourceTrackingMethod: annotation
      resource.exclusions: |
        - apiGroups: ["*"]
          kinds: ["ProviderConfigUsage"]
      resource.customizations: |
        "*.crossplane.io/*":
          health.lua: |
            health_status = {
              status = "Progressing",
              message = "Provisioning ..."
            }

            local function contains (table, val)
              for i, v in ipairs(table) do
                if v == val then
                  return true
                end
              end
              return false
            end

            local has_no_status = {
              "Composition",
              "CompositionRevision",
              "DeploymentRuntimeConfig",
              "ClusterProviderConfig",
              "ProviderConfig",
              "ProviderConfigUsage"
            }
            if obj.status == nil or next(obj.status) == nil and contains(has_no_status, obj.kind) then
                health_status.status = "Healthy"
                health_status.message = "Resource is up-to-date."
              return health_status
            end

            if obj.status == nil or next(obj.status) == nil or obj.status.conditions == nil then
              if (obj.kind == "ProviderConfig" or obj.kind == "ClusterProviderConfig") and obj.status.users ~= nil then
                health_status.status = "Healthy"
                health_status.message = "Resource is in use."
                return health_status
              end
              return health_status
            end

            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "LastAsyncOperation" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if condition.type == "Synced" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if contains({"Ready", "Healthy", "Offered", "Established", "ValidPipeline", "RevisionHealthy"}, condition.type) then
                if condition.status == "True" then
                  health_status.status = "Healthy"
                  health_status.message = "Resource is up-to-date."
                end
              end
            end

            return health_status
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            return hs
      oidc.config: |
        name: 'Authelia'
        issuer: 'https://auth-127-0-0-1.nip.io'
        clientID: 'argocd'
        clientSecret: $argocd-oidc-client-secret:password
        cliClientID: 'argocd-cli'
        requestedScopes:
          - 'openid'
          - 'email'
          - 'groups'
        enableUserInfoGroups: true
        userInfoPath: '/api/oidc/userinfo'
    rbac:
      policy.default: 'role:readonly'
      policy.csv: |
        # Platform maintainers get full admin access
        g, platform_maintainers, role:admin

        # Platform users get read-only access (default policy)
       