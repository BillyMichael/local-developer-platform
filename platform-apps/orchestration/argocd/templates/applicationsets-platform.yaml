{{- if .Values.platform.applicationSets.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-1
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-2
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-3
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-4
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-5
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-6
        - matchExpressions:
            - key: ldp.dev/sync-wave
              operator: In
              values:
                - wave-7
  generators:
    - git:
        repoURL: {{ .Values.platform.repoURL }}
        revision: {{ .Values.platform.targetRevision }}
        files:
          - path: "platform-apps/**/values.yaml"
        requeueAfterSeconds: 10
  template:
    metadata:
      # Escape for Helm, will be processed by ArgoCD
      name: '{{ `{{ index .path.segments 2 }}` }}'
      labels:
        # Progressive syncs match on labels (not annotations)
        # Each app declares ldp.syncWave in its values.yaml; defaults to wave-7 (last)
        ldp.dev/sync-wave: '{{ `{{ dig "ldp" "syncWave" "wave-7" . }}` }}'
    spec:
      project: default
      source:
        repoURL: {{ .Values.platform.repoURL }}
        targetRevision: {{ .Values.platform.targetRevision }}
        path: '{{ `{{ .path.path }}` }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ `{{ index .path.segments 1 }}` }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - 'ServerSideApply={{ `{{ dig "ldp" "serverSideApply" false . }}` }}'
        retry:
          limit: -1
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
{{- end }}
