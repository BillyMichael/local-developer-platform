apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.component_id }}-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.component_id }}-backend
  template:
    metadata:
      labels:
        app: ${{ values.component_id }}-backend
    spec:
      containers:
      - name: backend
        image: node:18-alpine # Placeholder, typically you'd build and push
        command: ["node", "/app/index.js"]
        workingDir: /app
        env:
        - name: DB_HOST
          value: ${{ values.component_id }}-db-rw
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ${{ values.component_id }}-db-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ${{ values.component_id }}-db-app
              key: password
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.component_id }}-backend
spec:
  selector:
    app: ${{ values.component_id }}-backend
  ports:
  - port: 80
    targetPort: 3000
